name: Build PHP (Windows)

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 0 * * 5'
  workflow_dispatch:
    inputs:
      version:
        description: 'PHP version to build'
        type: choice
        options:
          - all
          - "8.3"
          - "8.4"
          - "8.5"
        default: all

env:
  GITHUB_TOKEN: ${{ secrets.PAT }}
  SPC_VERSION: 2.8.5
  SPC_BUILD_OS: win

jobs:
  build:
    name: ${{ matrix.version }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON((github.event.inputs.version || 'all') == 'all' && '["8.3","8.4","8.5"]' || format('["{0}"]', github.event.inputs.version)) }}
        os: [windows-2025]
        include:
          - os: windows-2025
            arch: x64
            spc_asset: spc-windows-x64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Download SPC
        shell: bash
        run: |
          cd ..
          curl -fsSL -o spc.exe "https://github.com/crazywhalecc/static-php-cli/releases/download/${SPC_VERSION}/${{ matrix.spc_asset }}"
          chmod +x spc.exe
          mkdir -p static-php-cli/bin
          mv spc.exe static-php-cli/bin/

      - name: Setup system PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: pecl, composer
          extensions: curl, openssl, mbstring, sodium, tokenizer, filter
          ini-values: memory_limit=-1

      - name: SPC doctor
        run: |
          cd ../static-php-cli
          ./bin/spc.exe doctor

      - name: Read PHP extensions from file
        shell: bash
        run: |
          EXTENSIONS=$(php -r "echo trim(file_get_contents('php-extensions.txt'));")
          EXT_HASH=$(php -r "echo md5(getenv('EXTENSIONS'));")
          echo "PHP_EXTENSIONS=$EXTENSIONS" >> $GITHUB_ENV
          echo "PHP_EXT_HASH=$EXT_HASH" >> $GITHUB_ENV

      - name: Read PHP libraries from file
        shell: bash
        run: |
          LIBRARIES=$(php -r "echo trim(file_get_contents('php-libraries.txt'));")
          echo "PHP_LIBS=$LIBRARIES" >> $GITHUB_ENV

      - id: cache-spc-downloads
        uses: actions/cache@v5
        with:
          path: ../static-php-cli/downloads
          key: spc-downloads-${{ env.PHP_EXT_HASH }}

      - name: Download PHP extension sources
        if: steps.cache-spc-downloads.outputs.cache-hit != 'true'
        run: |
          cd ../static-php-cli
          ./bin/spc.exe download --with-php=${{ matrix.version }} --for-extensions "${{ env.PHP_EXTENSIONS }}" --prefer-pre-built

      # SPC 2.8.5 has no Windows zstd builder, but PHP ext/curl/config.w32
      # requires libzstd.lib. Stage a pre-built copy into buildroot so the
      # curl extension's config check passes.
      - name: Stage libzstd for curl extension
        shell: bash
        env:
          ZSTD_VERSION: v1.5.7
        run: |
          cd ..
          curl -fsSL -o zstd.zip "https://github.com/facebook/zstd/releases/download/${ZSTD_VERSION}/zstd-${ZSTD_VERSION}-win64.zip"
          unzip -q zstd.zip
          mkdir -p static-php-cli/buildroot/lib static-php-cli/buildroot/include
          cp "zstd-${ZSTD_VERSION}-win64/static/libzstd_static.lib" static-php-cli/buildroot/lib/libzstd.lib
          cp "zstd-${ZSTD_VERSION}-win64/include/"*.h static-php-cli/buildroot/include/
          rm -rf zstd.zip "zstd-${ZSTD_VERSION}-win64"

      # SPC's bundled icu-static-win is ICU 78, whose headers require C++17.
      # PHP 8.3's ext/intl/config.w32 doesn't pass /std:c++17 to MSVC (8.4+
      # does), so intl_convertcpp.cpp fails to compile. Extract php-src
      # manually and patch in /std:c++17 before SPC runs the build.
      #
      # The extract is run in pwsh (the workflow's default) rather than bash:
      # when spc.exe is launched from Git Bash, MSYS path conversion mangles
      # the tar -C path inside SPC's internal popen() and extraction fails.
      - name: Extract PHP source (8.3 intl patch prep)
        if: matrix.version == '8.3'
        run: |
          cd ../static-php-cli
          ./bin/spc.exe extract php-src

      - name: Patch PHP 8.3 ext/intl for C++17 (ICU 78 compatibility)
        if: matrix.version == '8.3'
        shell: bash
        run: |
          cd ../static-php-cli
          sed -i 's|"/EHsc /DUNISTR_FROM_CHAR_EXPLICIT|"/std:c++17 /EHsc /DUNISTR_FROM_CHAR_EXPLICIT|' source/php-src/ext/intl/config.w32

      - name: Build PHP
        run: |
          cd ../static-php-cli
          ./bin/spc.exe build --build-cli "${{ env.PHP_EXTENSIONS }}" --with-libs="${{ env.PHP_LIBS }}" --debug

      - name: Get built PHP version
        shell: bash
        run: |
          PHP_VERSION_FULL=$(../static-php-cli/buildroot/bin/php.exe -r "echo PHP_VERSION;")
          echo "PHP_VERSION_FULL=$PHP_VERSION_FULL" >> $GITHUB_ENV

      - name: Create bin directories
        shell: bash
        run: |
          mkdir -p bin/${{ env.SPC_BUILD_OS }}/${{ matrix.arch }}
          mkdir -p license-files
          mkdir -p build-meta

      - name: Zip PHP binary, copy metadata
        shell: bash
        run: |
          powershell Compress-Archive -Path "../static-php-cli/buildroot/bin/php.exe" -DestinationPath "bin/${{ env.SPC_BUILD_OS }}/${{ matrix.arch }}/php-${{ matrix.version }}.zip" -Force
          cp ../static-php-cli/buildroot/license/* license-files/
          cp ../static-php-cli/buildroot/build-extensions.json build-meta/build-extensions-${{ env.SPC_BUILD_OS }}.json
          cp ../static-php-cli/buildroot/build-libraries.json build-meta/build-libraries-${{ env.SPC_BUILD_OS }}.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-php-${{ matrix.version }}-${{ env.SPC_BUILD_OS }}-${{ matrix.arch }}
          title: "Update PHP ${{ matrix.version }} build for ${{ env.SPC_BUILD_OS }} ${{ matrix.arch }}"
          commit-message: "Update PHP ${{ matrix.version }} build for ${{ env.SPC_BUILD_OS }} ${{ matrix.arch }}"
          body: |
            PHP: ${{ env.PHP_VERSION_FULL }}
            Exts: ${{ env.PHP_EXTENSIONS }}
            OS: ${{ env.SPC_BUILD_OS }}
            Arch: ${{ matrix.arch }}
          base: main
